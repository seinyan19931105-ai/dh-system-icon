<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ディーエイチ管理システム</title>

  <meta name="apple-mobile-web-app-title" content="ディーエイチ管理システム">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#0b5c32">

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      color: #173226;
      background:
        radial-gradient(circle at top right, rgba(125, 208, 45, .18), transparent 34%),
        linear-gradient(160deg, #f7faf7 0%, #eef5ef 100%);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top))
               20px
               max(24px, env(safe-area-inset-bottom));
    }

    .card {
      width: min(100%, 460px);
      padding: 30px 24px 24px;
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 28px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 18px 50px rgba(20, 66, 39, .14);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .icon {
      width: 152px;
      height: 152px;
      border-radius: 34px;
      box-shadow: 0 12px 28px rgba(13, 92, 50, .18);
    }

    h1 {
      margin: 24px 0 8px;
      font-size: clamp(24px, 7vw, 32px);
      line-height: 1.35;
      letter-spacing: .02em;
    }

    .subtitle {
      margin: 0 0 26px;
      color: #678074;
      font-size: 14px;
    }

    .open-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 58px;
      padding: 14px 20px;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, #0b713c, #0b5c32);
      box-shadow: 0 10px 22px rgba(11, 92, 50, .24);
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .open-button:active {
      transform: translateY(2px);
      box-shadow: 0 5px 12px rgba(11, 92, 50, .22);
    }

    .guide {
      margin: 20px 0 0;
      padding: 15px;
      border-radius: 14px;
      color: #50675b;
      background: #f1f6f2;
      font-size: 13px;
      line-height: 1.7;
      text-align: left;
    }

    .guide strong {
      color: #234a35;
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="icon" src="dh-system-icon.png" alt="DH Management System">

    <h1>ディーエイチ<br>管理システム</h1>
    <p class="subtitle">DH MANAGEMENT SYSTEM</p>

    <a class="open-button" href="https://script.google.com/macros/s/AKfycbwkeeCkFc2RtwCathTM0-wqbV9XU7QeheHEmUEYbjhC4wyLLFlFHprgNlPfAn3Q6Iwzzg/exec">
      管理システムを開く
    </a>

    <p class="guide">
      <strong>iPhoneへの追加方法</strong><br>
      Safariの共有ボタンから「ホーム画面に追加」を選んでください。
      DHのアイコンとアプリ名が設定された状態で追加されます。
    </p>
  </main>
</body>
</html>
